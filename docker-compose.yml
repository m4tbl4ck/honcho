# Coolify-native Docker Compose for Honcho
#
# Usage in Coolify:
# 1. Add this repo as a Docker Compose resource
# 2. Coolify auto-detects SERVICE_FQDN from the "api" port
# 3. Set required Environment Variables in the Coolify UI (see below)
# 4. Deploy
#
# Required Coolify Environment Variables (set once in the UI, injected into ALL services):
#   POSTGRES_PASSWORD       â€” Database password (also used by api + deriver)
#   LLM_OPENAI_API_KEY      â€” Required LLM provider key (or ANTHROPIC / GEMINI)
#
# Optional toggles you may want to override:
#   AUTH_USE_AUTH           â€” Enable JWT auth (default: false)
#   AUTH_JWT_SECRET         â€” Required if AUTH_USE_AUTH=true
#   SENTRY_DSN              â€” Enable Sentry error tracking
#   DERIVER_ENABLED         â€” Background worker (default: true)
#   DREAM_ENABLED           â€” Dream processing (default: true)
#   SUMMARY_ENABLED         â€” Message summarization (default: true)
#   PEER_CARD_ENABLED       â€” Peer card feature (default: true)
#   CACHE_ENABLED           â€” Redis cache (default: true, recommended)
#   VECTOR_STORE_TYPE       â€” pgvector | turbopuffer | lancedb (default: pgvector)

services:
  api:
    image: ghcr.io/m4tbl4ck/honcho:latest
    build:
      context: .
      dockerfile: Dockerfile
    entrypoint: ["sh", "docker/entrypoint.sh"]
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000"
    healthcheck:
      test:
        [
          "CMD",
          "/app/.venv/bin/python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=2).read()",
        ]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    environment:
      # Coolify injects the domain automatically via SERVICE_FQDN_API_8000
      - SERVICE_FQDN_API_8000

      # -----------------------------------------------------------------------
      # Internal service wiring (do NOT change hostnames)
      # -----------------------------------------------------------------------
      - DB_CONNECTION_URI=postgresql+psycopg://postgres:${POSTGRES_PASSWORD}@database:5432/postgres
      - CACHE_URL=redis://redis:6379/0?suppress=true
      - CACHE_ENABLED=true

      # -----------------------------------------------------------------------
      # Application (shown in Coolify UI so you can override defaults)
      # -----------------------------------------------------------------------
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - NAMESPACE=${NAMESPACE:-honcho}
      - EMBED_MESSAGES=${EMBED_MESSAGES:-true}
      - SESSION_OBSERVERS_LIMIT=${SESSION_OBSERVERS_LIMIT:-10}
      - GET_CONTEXT_MAX_TOKENS=${GET_CONTEXT_MAX_TOKENS:-100000}
      - MAX_FILE_SIZE=${MAX_FILE_SIZE:-5242880}
      - MAX_MESSAGE_SIZE=${MAX_MESSAGE_SIZE:-25000}

      # -----------------------------------------------------------------------
      # Database pool / debug (optional overrides)
      # -----------------------------------------------------------------------
      - DB_SCHEMA=${DB_SCHEMA:-public}
      - DB_POOL_SIZE=${DB_POOL_SIZE:-10}
      - DB_MAX_OVERFLOW=${DB_MAX_OVERFLOW:-20}
      - DB_POOL_TIMEOUT=${DB_POOL_TIMEOUT:-30}
      - DB_POOL_RECYCLE=${DB_POOL_RECYCLE:-300}
      - DB_POOL_PRE_PING=${DB_POOL_PRE_PING:-true}
      - DB_POOL_USE_LIFO=${DB_POOL_USE_LIFO:-true}
      - DB_SQL_DEBUG=${DB_SQL_DEBUG:-false}
      - DB_TRACING=${DB_TRACING:-false}

      # -----------------------------------------------------------------------
      # Authentication
      # -----------------------------------------------------------------------
      - AUTH_USE_AUTH=${AUTH_USE_AUTH:-false}
      - AUTH_JWT_SECRET=${AUTH_JWT_SECRET}

      # -----------------------------------------------------------------------
      # LLM Provider (set at least one key in the Coolify UI)
      # -----------------------------------------------------------------------
      - LLM_OPENAI_API_KEY=${LLM_OPENAI_API_KEY}
      - LLM_ANTHROPIC_API_KEY=${LLM_ANTHROPIC_API_KEY}
      - LLM_GEMINI_API_KEY=${LLM_GEMINI_API_KEY}
      - LLM_DEFAULT_MAX_TOKENS=${LLM_DEFAULT_MAX_TOKENS:-2500}
      - LLM_MAX_TOOL_OUTPUT_CHARS=${LLM_MAX_TOOL_OUTPUT_CHARS:-10000}
      - LLM_MAX_MESSAGE_CONTENT_CHARS=${LLM_MAX_MESSAGE_CONTENT_CHARS:-2000}

      # -----------------------------------------------------------------------
      # Embedding
      # -----------------------------------------------------------------------
      - EMBEDDING_VECTOR_DIMENSIONS=${EMBEDDING_VECTOR_DIMENSIONS:-1536}
      - EMBEDDING_MAX_INPUT_TOKENS=${EMBEDDING_MAX_INPUT_TOKENS:-8192}
      - EMBEDDING_MAX_TOKENS_PER_REQUEST=${EMBEDDING_MAX_TOKENS_PER_REQUEST:-300000}
      - EMBEDDING_MODEL_CONFIG__TRANSPORT=${EMBEDDING_MODEL_CONFIG__TRANSPORT:-openai}
      - EMBEDDING_MODEL_CONFIG__MODEL=${EMBEDDING_MODEL_CONFIG__MODEL:-text-embedding-3-small}

      # -----------------------------------------------------------------------
      # Deriver (background worker)
      # -----------------------------------------------------------------------
      - DERIVER_ENABLED=${DERIVER_ENABLED:-true}
      - DERIVER_WORKERS=${DERIVER_WORKERS:-1}
      - DERIVER_POLLING_SLEEP_INTERVAL_SECONDS=${DERIVER_POLLING_SLEEP_INTERVAL_SECONDS:-1.0}
      - DERIVER_STALE_SESSION_TIMEOUT_MINUTES=${DERIVER_STALE_SESSION_TIMEOUT_MINUTES:-5}
      - DERIVER_DEDUPLICATE=${DERIVER_DEDUPLICATE:-true}
      - DERIVER_LOG_OBSERVATIONS=${DERIVER_LOG_OBSERVATIONS:-false}
      - DERIVER_MAX_INPUT_TOKENS=${DERIVER_MAX_INPUT_TOKENS:-25000}
      - DERIVER_MAX_CUSTOM_INSTRUCTIONS_TOKENS=${DERIVER_MAX_CUSTOM_INSTRUCTIONS_TOKENS:-2000}
      - DERIVER_WORKING_REPRESENTATION_MAX_OBSERVATIONS=${DERIVER_WORKING_REPRESENTATION_MAX_OBSERVATIONS:-100}
      - DERIVER_REPRESENTATION_BATCH_MAX_TOKENS=${DERIVER_REPRESENTATION_BATCH_MAX_TOKENS:-1024}
      - DERIVER_FLUSH_ENABLED=${DERIVER_FLUSH_ENABLED:-false}
      - DERIVER_MODEL_CONFIG__TRANSPORT=${DERIVER_MODEL_CONFIG__TRANSPORT:-openai}
      - DERIVER_MODEL_CONFIG__MODEL=${DERIVER_MODEL_CONFIG__MODEL:-gpt-5.4-mini}

      # -----------------------------------------------------------------------
      # Peer Card
      # -----------------------------------------------------------------------
      - PEER_CARD_ENABLED=${PEER_CARD_ENABLED:-true}

      # -----------------------------------------------------------------------
      # Dialectic
      # -----------------------------------------------------------------------
      - DIALECTIC_MAX_OUTPUT_TOKENS=${DIALECTIC_MAX_OUTPUT_TOKENS:-8192}
      - DIALECTIC_MAX_INPUT_TOKENS=${DIALECTIC_MAX_INPUT_TOKENS:-100000}
      - DIALECTIC_HISTORY_TOKEN_LIMIT=${DIALECTIC_HISTORY_TOKEN_LIMIT:-8192}
      - DIALECTIC_SESSION_HISTORY_MAX_TOKENS=${DIALECTIC_SESSION_HISTORY_MAX_TOKENS:-4096}

      # -----------------------------------------------------------------------
      # Summary
      # -----------------------------------------------------------------------
      - SUMMARY_ENABLED=${SUMMARY_ENABLED:-true}
      - SUMMARY_MESSAGES_PER_SHORT_SUMMARY=${SUMMARY_MESSAGES_PER_SHORT_SUMMARY:-20}
      - SUMMARY_MESSAGES_PER_LONG_SUMMARY=${SUMMARY_MESSAGES_PER_LONG_SUMMARY:-60}
      - SUMMARY_MAX_TOKENS_SHORT=${SUMMARY_MAX_TOKENS_SHORT:-1000}
      - SUMMARY_MAX_TOKENS_LONG=${SUMMARY_MAX_TOKENS_LONG:-4000}
      - SUMMARY_MODEL_CONFIG__TRANSPORT=${SUMMARY_MODEL_CONFIG__TRANSPORT:-openai}
      - SUMMARY_MODEL_CONFIG__MODEL=${SUMMARY_MODEL_CONFIG__MODEL:-gpt-5.4-mini}

      # -----------------------------------------------------------------------
      # Dream
      # -----------------------------------------------------------------------
      - DREAM_ENABLED=${DREAM_ENABLED:-true}
      - DREAM_DOCUMENT_THRESHOLD=${DREAM_DOCUMENT_THRESHOLD:-50}
      - DREAM_IDLE_TIMEOUT_MINUTES=${DREAM_IDLE_TIMEOUT_MINUTES:-60}
      - DREAM_MIN_HOURS_BETWEEN_DREAMS=${DREAM_MIN_HOURS_BETWEEN_DREAMS:-8}
      - DREAM_ENABLED_TYPES=${DREAM_ENABLED_TYPES:-["omni"]}
      - DREAM_MAX_TOOL_ITERATIONS=${DREAM_MAX_TOOL_ITERATIONS:-20}
      - DREAM_HISTORY_TOKEN_LIMIT=${DREAM_HISTORY_TOKEN_LIMIT:-16384}
      - DREAM_DEDUCTION_MODEL_CONFIG__TRANSPORT=${DREAM_DEDUCTION_MODEL_CONFIG__TRANSPORT:-openai}
      - DREAM_DEDUCTION_MODEL_CONFIG__MODEL=${DREAM_DEDUCTION_MODEL_CONFIG__MODEL:-gpt-5.4-mini}
      - DREAM_INDUCTION_MODEL_CONFIG__TRANSPORT=${DREAM_INDUCTION_MODEL_CONFIG__TRANSPORT:-openai}
      - DREAM_INDUCTION_MODEL_CONFIG__MODEL=${DREAM_INDUCTION_MODEL_CONFIG__MODEL:-gpt-5.4-mini}

      # -----------------------------------------------------------------------
      # Webhook
      # -----------------------------------------------------------------------
      - WEBHOOK_SECRET=${WEBHOOK_SECRET}
      - WEBHOOK_MAX_WORKSPACE_LIMIT=${WEBHOOK_MAX_WORKSPACE_LIMIT:-10}

      # -----------------------------------------------------------------------
      # Sentry
      # -----------------------------------------------------------------------
      - SENTRY_ENABLED=${SENTRY_ENABLED:-false}
      - SENTRY_DSN=${SENTRY_DSN}
      - SENTRY_RELEASE=${SENTRY_RELEASE}
      - SENTRY_ENVIRONMENT=${SENTRY_ENVIRONMENT:-development}
      - SENTRY_TRACES_SAMPLE_RATE=${SENTRY_TRACES_SAMPLE_RATE:-0.1}
      - SENTRY_PROFILES_SAMPLE_RATE=${SENTRY_PROFILES_SAMPLE_RATE:-0.1}

      # -----------------------------------------------------------------------
      # Metrics & Telemetry
      # -----------------------------------------------------------------------
      - METRICS_ENABLED=${METRICS_ENABLED:-false}
      - TELEMETRY_ENABLED=${TELEMETRY_ENABLED:-false}

      # -----------------------------------------------------------------------
      # Vector Store
      # -----------------------------------------------------------------------
      - VECTOR_STORE_TYPE=${VECTOR_STORE_TYPE:-pgvector}
      - VECTOR_STORE_MIGRATED=${VECTOR_STORE_MIGRATED:-false}

    restart: unless-stopped

  deriver:
    image: ghcr.io/m4tbl4ck/honcho:latest
    build:
      context: .
      dockerfile: Dockerfile
    entrypoint: ["/app/.venv/bin/python", "-m", "src.deriver"]
    depends_on:
      api:
        condition: service_healthy
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # Internal wiring (must match api service)
      - DB_CONNECTION_URI=postgresql+psycopg://postgres:${POSTGRES_PASSWORD}@database:5432/postgres
      - CACHE_URL=redis://redis:6379/0?suppress=true
      - CACHE_ENABLED=true
      # Resource-level ENV variables (LLM keys, auth, toggles) are injected by Coolify automatically.
      # No need to repeat them here.
    restart: unless-stopped

  database:
    image: pgvector/pgvector:latest
    restart: unless-stopped
    command: ["postgres", "-c", "max_connections=200"]
    environment:
      - POSTGRES_DB=postgres
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - pgdata:/var/lib/postgresql/data/
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:latest
    restart: unless-stopped
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  redis-data:
